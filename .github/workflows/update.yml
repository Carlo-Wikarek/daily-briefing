name: Daily Update

on:
  schedule:
    - cron: "45 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4.2.2

      - name: Debug Python Umgebung
        run: |
          python --version
          python -m pip list

      - name: Python einrichten
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install feedparser requests beautifulsoup4

      - name: Feeds abrufen und HTML generieren
        run: python fetch_feeds.py

      - name: Aenderungen pruefen
        id: check_changes
        run: |
          if git diff --quiet index.html seen.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Keine Aenderungen vorhanden."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Aenderungen erkannt."
          fi

      - name: Aenderungen committen und pushen
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html seen.json
          git commit -m "chore: daily update"
          git push
